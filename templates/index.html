<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="siteTitleTag">RACK FF | NEURAL CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'NevanMain';
            src: url('./nevan.ttf') format('truetype');
            font-display: swap;
        }

        .nevan {
            font-family: 'NevanMain', sans-serif !important;
            letter-spacing: 3px;
            color: #ffffff;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            color: white;
            min-height: 100vh;
        }

        #loader-wrapper {
            position: fixed; inset: 0; background: #020617;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999;
        }

        .loader-ring {
            width: 280px; height: 280px;
            border-radius: 50%;
            border: 10px solid rgba(255, 255, 255, 0.03);
            border-top: 10px solid #0ea5e9;
            border-right: 10px solid #22d3ee;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .percent-text { position: absolute; font-size: 55px; font-weight: 900; color: #fff; }

        .cyber-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(14, 165, 233, 0.5);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .input-field {
            background: rgba(0, 0, 0, 0.6) !important;
            border: 2px solid #334155 !important;
            color: #fff !important;
            font-size: 1.2rem;
        }
        .input-field:focus { border-color: #0ea5e9 !important; }

        .video-container {
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
            aspect-ratio: 9 / 16;
            background: #000;
            border: 4px solid #0ea5e9;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.4);
        }
        #videoPreview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #adminPanel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .log-box { background: #000; border: 1px solid #0ea5e9; height: 200px; overflow-y: auto; padding: 10px; font-family: monospace; color: #10b981; font-size: 12px; }
    </style>
</head>
<body class="py-10 px-4" onclick="handleTripleClick()">

    <div id="loader-wrapper">
        <div class="loader-ring"></div>
        <div class="percent-text nevan" id="load-percent">0%</div>
        <p class="nevan text-sky-400 mt-24 animate-pulse text-sm tracking-[10px]">SYNCING_FILES...</p>
    </div>

    <div class="text-center mt-6 mb-12">
        <h1 id="dynamicTitle" class="text-7xl md:text-9xl font-black mb-4 nevan tracking-tighter" style="text-shadow: 0 0 30px rgba(14, 165, 233, 0.8);">RACK FF</h1>
        <div class="inline-flex items-center gap-3 bg-slate-900/80 border-2 border-sky-500/50 px-8 py-3 rounded-full">
            <span id="statusDot" class="w-3 h-3 rounded-full bg-sky-500 shadow-[0_0_15px_#0ea5e9]"></span>
            <span id="statusText" class="nevan text-xs text-sky-400 uppercase font-bold">SYSTEM ACTIVE</span>
        </div>
    </div>

    <div class="w-full max-w-3xl cyber-card p-12 rounded-[3rem] mb-12 mx-auto">
        <label class="nevan text-[11px] text-sky-300 mb-5 block font-bold tracking-[5px]">INPUT SOURCE</label>
        <input type="text" id="videoUrl" placeholder="PASTE URL HERE" class="w-full p-6 rounded-2xl input-field nevan mb-10 outline-none">

        <button onclick="startDownload()" id="mainBtn" class="w-full bg-sky-600 hover:bg-sky-500 text-white nevan py-8 rounded-2xl shadow-2xl shadow-sky-900/50 text-2xl active:scale-95 transition-all border-b-8 border-sky-800">
            EXTRACT DATA
        </button>

        <div id="result" class="hidden mt-12 space-y-8">
            <div class="video-container">
                <video id="videoPreview" controls></video>
            </div>
            <a id="videoDl" href="" target="_blank" class="flex items-center justify-center w-full bg-white text-black p-6 rounded-2xl nevan font-black text-xl hover:bg-sky-400 transition-all">DOWNLOAD FILE</a>
        </div>
    </div>

    <div id="adminPanel">
        <div class="w-full max-w-lg p-10 bg-slate-900 border-2 border-sky-500 rounded-[3rem] nevan">
            <h2 class="text-3xl text-center mb-8 text-sky-400 tracking-widest">ADMIN TERMINAL</h2>
            <div class="space-y-5">
                <input type="text" id="newTitleInput" placeholder="SET_NEW_TITLE" class="w-full p-4 bg-black border border-sky-900 rounded-xl">
                <input type="text" id="newApiInput" placeholder="SET_API_URL" class="w-full p-4 bg-black border border-sky-900 rounded-xl">
                <button onclick="updateSystem()" class="w-full bg-sky-600 py-5 rounded-xl font-bold">COMMIT_CHANGES</button>
                <div class="mt-8">
                    <p class="text-[10px] text-emerald-400 mb-2 tracking-[4px]">LIVE_TRAFFIC_LOGS</p>
                    <div id="adminLogs" class="log-box space-y-2">
                        <div>[SYSTEM] INITIALIZING_LISTENER...</div>
                    </div>
                </div>
                <button onclick="closeAdmin()" class="w-full text-slate-500 text-[10px] mt-4 tracking-[5px]">TERMINATE_SESSION</button>
            </div>
        </div>
    </div>

    <script>
        let API_BASE = localStorage.getItem('rack_api') || window.location.origin;
        let clicks = 0;

        function handleTripleClick() {
            clicks++;
            if (clicks >= 3) { checkAdmin(); clicks = 0; }
            setTimeout(() => { clicks = 0; }, 1000);
        }

        function startLoading() {
            let p = 0;
            const text = document.getElementById('load-percent');
            const wrapper = document.getElementById('loader-wrapper');
            const interval = setInterval(() => {
                p += Math.floor(Math.random() * 6) + 1;
                if(p >= 100) {
                    p = 100; clearInterval(interval);
                    setTimeout(() => { wrapper.style.opacity = '0'; setTimeout(() => wrapper.style.display = 'none', 800); }, 500);
                }
                text.innerText = p + "%";
            }, 50);
        }

        async function logUser() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                const log = document.createElement('div');
                log.innerHTML = `<span class="text-sky-500">[${new Date().toLocaleTimeString()}]</span> IP: ${d.ip} (${d.city})`;
                document.getElementById('adminLogs').prepend(log);
            } catch { console.log("Log error"); }
        }

        async function startDownload() {
            const url = document.getElementById('videoUrl').value;
            const btn = document.getElementById('mainBtn');
            if(!url) return;
            logUser();
            btn.innerText = "EXTRACTING..."; btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/download?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                if(data.success) {
                    document.getElementById('result').classList.remove('hidden');
                    document.getElementById('videoPreview').src = data.video_url;
                    document.getElementById('videoDl').href = data.video_url;
                    btn.innerText = "EXTRACT_COMPLETE";
                }
            } catch { btn.innerText = "CORE_ERROR"; }
            finally { btn.disabled = false; }
        }

        window.onload = async () => {
            startLoading();
            try {
                const res = await fetch('/config.json');
                const data = await res.json();
                document.getElementById('dynamicTitle').innerText = data.title;
                document.getElementById('siteTitleTag').innerText = data.title;
            } catch {}
        };

        function checkAdmin() { if(prompt("ACCESS_KEY:") === "RASHID707") document.getElementById('adminPanel').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

        async function updateSystem() {
            const nt = document.getElementById('newTitleInput').value;
            const nl = document.getElementById('newApiInput').value;
            if(nt) {
                await fetch('/update_title', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ title: nt })
                });
                document.getElementById('dynamicTitle').innerText = nt;
            }
            if(nl) { API_BASE = nl; localStorage.setItem('rack_api', nl); }
            closeAdmin();
        }
    </script>
</body>
      </html>
